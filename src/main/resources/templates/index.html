<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>HTMX + Thymeleaf + Webawesome</title>
    <link rel="stylesheet" href="/static/webawesome.css">
    <script src="https://unpkg.com/htmx.org@1.9.5"></script>
</head>
<body>

<div class="wa-container wa-mt-8">
    <h1 class="wa-text-2xl wa-font-bold wa-text-primary">Hello HTMX with Webawesome!</h1>

    <form class="wa-flex wa-gap-4 wa-mt-4">
        <input
                type="text"
                name="name"
                class="wa-input wa-border wa-border-gray-400 wa-rounded"
                placeholder="Your name"
                hx-get="/hello"
                hx-target="#response"
                hx-trigger="keyup changed delay:500ms"
        />

        <button
                type="submit"
                class="wa-btn wa-btn-primary"
                hx-get="/hello"
                hx-target="#response"
        >
            Greet
        </button>
    </form>

    <div id="response" class="wa-mt-4"></div>
</div>

</body>
</html>
