<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Enhanced Products Table Fragment -->
<div th:fragment="products-table" class="fade-in">

    <!-- Products Table with Glass Effect -->
    <div class="glass-effect wa-rounded-2xl wa-shadow-2xl wa-overflow-hidden wa-mb-8">
        <div class="wa-bg-gradient-to-r wa-from-purple-600 wa-to-purple-700 wa-px-8 wa-py-6 wa-border-b wa-border-purple-500">
            <div class="wa-flex wa-items-center wa-justify-between">
                <div class="wa-flex wa-items-center wa-gap-3">
                    <div class="wa-bg-white wa-bg-opacity-20 wa-p-3 wa-rounded-lg">
                        <i class="fa-solid fa-list wa-text-2xl wa-text-white"></i>
                    </div>
                    <div>
                        <h3 class="wa-text-2xl wa-font-bold wa-text-white">Products Inventory</h3>
                        <p class="wa-text-purple-100 wa-text-sm wa-mt-1">
                            <span th:text="${products.size()}">0</span> products in catalog
                        </p>
                    </div>
                </div>
                <div class="wa-flex wa-gap-2">
                    <button class="wa-btn wa-btn-light wa-btn-sm wa-gap-2">
                        <i class="fa-solid fa-download"></i>
                        Export
                    </button>
                    <button class="wa-btn wa-btn-light wa-btn-sm wa-gap-2">
                        <i class="fa-solid fa-filter"></i>
                        Filter
                    </button>
                </div>
            </div>
        </div>

        <div class="wa-overflow-x-auto">
            <table class="wa-w-full">
                <thead class="wa-bg-neutral-50">
                <tr>
                    <th class="wa-px-6 wa-py-4 wa-text-left wa-text-xs wa-font-bold wa-text-neutral-700 wa-uppercase wa-tracking-wider">
                        <i class="fa-solid fa-image wa-mr-2"></i>Image
                    </th>
                    <th class="wa-px-6 wa-py-4 wa-text-left wa-text-xs wa-font-bold wa-text-neutral-700 wa-uppercase wa-tracking-wider">
                        <i class="fa-solid fa-tag wa-mr-2"></i>Product
                    </th>
                    <th class="wa-px-6 wa-py-4 wa-text-left wa-text-xs wa-font-bold wa-text-neutral-700 wa-uppercase wa-tracking-wider">
                        <i class="fa-solid fa-folder wa-mr-2"></i>Type
                    </th>
                    <th class="wa-px-6 wa-py-4 wa-text-left wa-text-xs wa-font-bold wa-text-neutral-700 wa-uppercase wa-tracking-wider">
                        <i class="fa-solid fa-hashtag wa-mr-2"></i>ID
                    </th>
                    <th class="wa-px-6 wa-py-4 wa-text-left wa-text-xs wa-font-bold wa-text-neutral-700 wa-uppercase wa-tracking-wider">
                        <i class="fa-solid fa-layer-group wa-mr-2"></i>Variants
                    </th>
                    <th class="wa-px-6 wa-py-4 wa-text-left wa-text-xs wa-font-bold wa-text-neutral-700 wa-uppercase wa-tracking-wider">
                        <i class="fa-solid wa-wrench wa-mr-2"></i>Actions
                    </th>
                </tr>
                </thead>
                <tbody id="products-table-body" class="wa-divide-y wa-divide-neutral-200 wa-bg-white">
                <tr th:each="product : ${products}" class="wa-hover:bg-purple-50 wa-transition-all">
                    <td class="wa-px-6 wa-py-5">
                        <div class="product-image-wrapper wa-w-20 wa-h-20">
                            <!--                            <img th:src="${product.imageUrl}"-->
                            <!--                                 th:alt="${product.title}"-->
                            <!--                                 class="wa-w-full wa-h-full wa-object-cover wa-rounded-lg wa-shadow-md wa-border-2 wa-border-purple-100"/>-->
                        </div>
                    </td>
                    <td class="wa-px-6 wa-py-5">
                        <div>
                            <div class="wa-font-bold wa-text-neutral-900 wa-text-lg" th:text="${product.title}">Product
                                Name
                            </div>
                            <div class="wa-text-sm wa-text-neutral-500 wa-mt-1 wa-line-clamp-1"
                                 th:utext="${product.bodyHTML}">Description
                            </div>
                        </div>
                    </td>
                    <td class="wa-px-6 wa-py-5">
                            <span class="wa-inline-flex wa-items-center wa-gap-2 wa-px-4 wa-py-2 wa-rounded-full wa-bg-gradient-to-r wa-from-purple-500 wa-to-purple-600 wa-text-white wa-text-sm wa-font-semibold wa-shadow">
                                <i class="fa-solid fa-circle wa-text-xs"></i>
                                <span th:text="${product.productType}">Type</span>
                            </span>
                    </td>
                    <td class="wa-px-6 wa-py-5">
                        <span class="wa-font-mono wa-text-neutral-600 wa-bg-neutral-100 wa-px-3 wa-py-1 wa-rounded-md wa-text-sm"
                              th:text="${product.externalId}">12345</span>
                    </td>
                    <td class="wa-px-6 wa-py-5">
                            <span class="wa-inline-flex wa-items-center wa-gap-2 wa-px-4 wa-py-2 wa-rounded-full wa-bg-gradient-to-r wa-from-blue-500 wa-to-blue-600 wa-text-white wa-text-sm wa-font-semibold wa-shadow">
                                <i class="fa-solid fa-cubes wa-text-xs"></i>
                                <span th:text="${product.variants.size()}">0</span>
                            </span>
                    </td>
                    <td class="wa-px-6 wa-py-5">
                        <div class="wa-flex wa-gap-2">
                            <button class="wa-btn wa-btn-sm wa-bg-blue-500 wa-text-white hover:wa-bg-blue-600 wa-shadow"
                                    title="View Details">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                            <button class="wa-btn wa-btn-sm wa-bg-green-500 wa-text-white hover:wa-bg-green-600 wa-shadow"
                                    title="Edit">
                                <i class="fa-solid fa-edit"></i>
                            </button>
                            <button class="wa-btn wa-btn-sm wa-bg-red-500 wa-text-white hover:wa-bg-red-600 wa-shadow"
                                    title="Delete"
                                    th:hx-delete="@{/products/{id}(id=${product.internalId})}"
                                    hx-confirm="Are you sure you want to delete this product?"
                                    hx-target="#products-container"
                                    hx-swap="innerHTML">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Enhanced Empty State -->
        <div th:if="${products.isEmpty()}" class="wa-px-6 wa-py-16 wa-text-center wa-bg-white">
            <div class="wa-bg-neutral-100 wa-w-32 wa-h-32 wa-rounded-full wa-mx-auto wa-flex wa-items-center wa-justify-center wa-mb-6">
                <i class="fa-solid fa-box-open wa-text-6xl wa-text-neutral-300"></i>
            </div>
            <h4 class="wa-text-2xl wa-font-bold wa-text-neutral-700 wa-mb-2">No products found</h4>
            <p class="wa-text-neutral-500 wa-text-lg">Start by adding your first product below</p>
        </div>
    </div>

    <!-- Enhanced Add Product Form -->
    <div class="glass-effect wa-rounded-2xl wa-shadow-2xl wa-p-8">
        <div class="wa-mb-8">
            <div class="wa-flex wa-items-center wa-gap-4 wa-mb-4">
                <div class="wa-bg-gradient-to-br wa-from-green-500 wa-to-green-700 wa-p-4 wa-rounded-xl wa-shadow-lg">
                    <i class="fa-solid fa-plus-circle wa-text-3xl wa-text-white"></i>
                </div>
                <div>
                    <h3 class="wa-text-3xl wa-font-bold wa-text-neutral-800">Add New Product</h3>
                    <p class="wa-text-neutral-600 wa-text-lg wa-mt-1">Fill in the details to create a new product</p>
                </div>
            </div>
            <div class="wa-h-1 wa-bg-gradient-to-r wa-from-green-400 wa-to-green-600 wa-rounded-full wa-w-24"></div>
        </div>

        <form hx-post="/products/add"
              hx-target="#products-container"
              hx-swap="innerHTML"
              hx-indicator="#form-loading"
              class="wa-space-y-6">

            <div class="wa-grid wa-grid-cols-1 md:wa-grid-cols-2 wa-gap-6">

                <!-- External ID -->
                <div class="wa-group">
                    <label class="wa-block wa-text-sm wa-font-bold wa-text-neutral-700 wa-mb-3">
                        <i class="fa-solid fa-hashtag wa-mr-2 wa-text-purple-600"></i>
                        External ID
                    </label>
                    <div class="wa-relative">
                        <input type="number"
                               name="externalId"
                               required
                               class="wa-input wa-w-full wa-pl-12 wa-py-3 wa-border-2 wa-border-neutral-200 focus:wa-border-purple-500 wa-rounded-xl wa-shadow-sm wa-transition"
                               placeholder="Enter external ID"/>
                        <div class="wa-absolute wa-left-4 wa-top-1/2 -wa-translate-y-1/2 wa-text-neutral-400">
                            <i class="fa-solid fa-hashtag"></i>
                        </div>
                    </div>
                </div>

                <!-- Product Type -->
                <div class="wa-group">
                    <label class="wa-block wa-text-sm wa-font-bold wa-text-neutral-700 wa-mb-3">
                        <i class="fa-solid fa-tag wa-mr-2 wa-text-purple-600"></i>
                        Product Type
                    </label>
                    <div class="wa-relative">
                        <input type="text"
                               name="productType"
                               required
                               class="wa-input wa-w-full wa-pl-12 wa-py-3 wa-border-2 wa-border-neutral-200 focus:wa-border-purple-500 wa-rounded-xl wa-shadow-sm wa-transition"
                               placeholder="e.g., Clothing, Electronics"/>
                        <div class="wa-absolute wa-left-4 wa-top-1/2 -wa-translate-y-1/2 wa-text-neutral-400">
                            <i class="fa-solid fa-tag"></i>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Title -->
            <div class="wa-group">
                <label class="wa-block wa-text-sm wa-font-bold wa-text-neutral-700 wa-mb-3">
                    <i class="fa-solid fa-heading wa-mr-2 wa-text-purple-600"></i>
                    Product Title
                </label>
                <div class="wa-relative">
                    <input type="text"
                           name="title"
                           required
                           class="wa-input wa-w-full wa-pl-12 wa-py-3 wa-border-2 wa-border-neutral-200 focus:wa-border-purple-500 wa-rounded-xl wa-shadow-sm wa-transition"
                           placeholder="Enter product title"/>
                    <div class="wa-absolute wa-left-4 wa-top-1/2 -wa-translate-y-1/2 wa-text-neutral-400">
                        <i class="fa-solid fa-heading"></i>
                    </div>
                </div>
            </div>

            <!-- Description -->
            <div class="wa-group">
                <label class="wa-block wa-text-sm wa-font-bold wa-text-neutral-700 wa-mb-3">
                    <i class="fa-solid fa-align-left wa-mr-2 wa-text-purple-600"></i>
                    Description (HTML)
                </label>
                <textarea name="bodyHTML"
                          required
                          rows="4"
                          class="wa-textarea wa-w-full wa-px-4 wa-py-3 wa-border-2 wa-border-neutral-200 focus:wa-border-purple-500 wa-rounded-xl wa-shadow-sm wa-transition"
                          placeholder="Enter product description in HTML format"></textarea>
            </div>

            <!-- Image URL -->
            <div class="wa-group">
                <label class="wa-block wa-text-sm wa-font-bold wa-text-neutral-700 wa-mb-3">
                    <i class="fa-solid fa-image wa-mr-2 wa-text-purple-600"></i>
                    Image URL
                </label>
                <div class="wa-relative">
                    <input type="url"
                           name="imageUrl"
                           required
                           class="wa-input wa-w-full wa-pl-12 wa-py-3 wa-border-2 wa-border-neutral-200 focus:wa-border-purple-500 wa-rounded-xl wa-shadow-sm wa-transition"
                           placeholder="https://example.com/image.jpg"/>
                    <div class="wa-absolute wa-left-4 wa-top-1/2 -wa-translate-y-1/2 wa-text-neutral-400">
                        <i class="fa-solid fa-image"></i>
                    </div>
                </div>
            </div>

            <!-- Submit Buttons -->
            <div class="wa-flex wa-items-center wa-gap-4 wa-pt-6 wa-border-t-2 wa-border-neutral-200">
                <button type="submit"
                        class="wa-btn wa-bg-gradient-to-r wa-from-green-500 wa-to-green-600 wa-text-white wa-gap-3 wa-px-8 wa-py-3 wa-shadow-lg wa-text-lg wa-font-semibold hover:wa-shadow-xl wa-transition">
                    <i class="fa-solid fa-plus-circle"></i>
                    <span>Add Product</span>
                </button>

                <button type="reset"
                        class="wa-btn wa-btn-outline wa-gap-3 wa-px-8 wa-py-3 wa-text-lg">
                    <i class="fa-solid fa-times-circle"></i>
                    <span>Clear Form</span>
                </button>

                <!-- Enhanced Form Loading Indicator -->
                <div id="form-loading"
                     class="htmx-indicator wa-flex wa-items-center wa-gap-3 wa-px-6 wa-py-3 wa-bg-green-50 wa-rounded-xl wa-border-2 wa-border-green-200 wa-shadow">
                    <i class="fa-solid fa-spinner fa-spin wa-text-2xl wa-text-green-600"></i>
                    <div>
                        <p class="wa-font-semibold wa-text-green-700">Saving product...</p>
                        <p class="wa-text-xs wa-text-green-600">Please wait</p>
                    </div>
                </div>
            </div>

        </form>
    </div>

</div>

</body>
</html>
