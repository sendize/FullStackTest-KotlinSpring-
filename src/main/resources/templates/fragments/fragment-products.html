<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://kit.webawesome.com/1a257bfedcd54677.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/css/product.css}">
    <!--    <link rel="stylesheet" href="/static/css/product.css">-->
</head>
<body>

<!--<div th:fragment="products-table" class="products-table-wrapper">-->
<div th:fragment="products-table">
    <div class="table-header">
        <h3>
            <wa-icon name="list"></wa-icon>
            Products Inventory
        </h3>
        <span class="product-count" th:text="${products.size()} + ' products'">0 products</span>
    </div>

    <div th:if="${products.isEmpty()}" class="empty-state">
        <wa-icon name="box-open" variant="solid"></wa-icon>
        <p class="main-text">No products found</p>
        <p class="sub-text">Start by adding your first product</p>
    </div>

    <!-- Scrollable container -->

    <div th:if="${!products.isEmpty()}" class="table-scroll-container">
        <wa-scroller orientation="vertical" style="max-height: 1000px;">
            <table>
                <thead>
                <tr>
                    <th>
                        <wa-icon name="image"></wa-icon>
                        Image
                    </th>
                    <th>
                        <wa-icon name="tag"></wa-icon>
                        Product Details and Variants
                    </th>
                    <th>
                        <wa-icon name="align-left"></wa-icon>
                        Product Description
                    </th>
                    <th>
                        <wa-icon name="wrench"></wa-icon>
                        Actions
                    </th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="product : ${products}">
                    <!-- Main Product Row -->
                    <tr class="product-main-row">
                        <td>
                            <div class="product-image-container">
                                <img th:src="${product.imageUrl}"
                                     th:alt="${product.title}"
                                     class="product-image"/>
                            </div>
                        </td>
                        <td>
                            <div class="product-title" th:text="${product.title}">Product Name</div>
                            <div th:if="${!#strings.isEmpty(product.productType)}"
                                 th:text="${'('+product.productType+')'}"
                                 class="product-type">
                                Product Type
                            </div>
                            <div class="product-variants">
                                <div th:if="${product.variants.isEmpty()}" class="no-variants">
                                    <wa-icon name="ban"></wa-icon>
                                    No variants
                                </div>

                                <div th:if="${!product.variants.isEmpty()}">
                                    <wa-scroller orientation="vertical" style="max-height: 170px;--shadow-size:0">
                                <span th:each="variant : ${product.variants}"
                                      class="badge badge-variant"
                                      th:text="${variant.title}">
                                    Color / Size
                                </span>
                                    </wa-scroller>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="product-description-content">
                                <div class="description-text" th:utext="${product.bodyHTML}">
                                    Product description goes here
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <a th:href="@{/products/update/{id}(id=${product.internalId})}"
                                   style="text-decoration: none;">
                                    <wa-button variant="success" size="small">
                                        <wa-icon name="edit"></wa-icon>
                                    </wa-button>
                                </a>
                                <wa-button
                                        variant="danger"
                                        size="small"
                                        th:hx-delete="@{/products/{id}(id=${product.internalId})}"
                                        hx-confirm="Are you sure you want to delete this product?"
                                        hx-target="#products-container"
                                        hx-swap="innerHTML">
                                    <wa-icon name="trash"></wa-icon>
                                </wa-button>
                            </div>
                        </td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </wa-scroller>
    </div>
</div>

</body>
</html>
